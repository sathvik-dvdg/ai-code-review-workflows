name: Gemini Code Review

on:
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true

# Opt into Node 24 to remove deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Necessary for git diff to find history

      - name: Create diff
        run: |
          git fetch origin
          # Compare HEAD against its parent; handle cases with no diff safely
          git diff HEAD^ HEAD > diff.txt || echo "No diff" > diff.txt

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Gemini SDK
        run: pip install google-generativeai

      - name: Create review script
        run: |
          # The EOF marker and the code inside are indented to satisfy YAML parsing.
          # The shell will treat everything between the EOF markers as the file content.
          cat << 'EOF' > review.py
          import os
          import google.generativeai as genai

          api_key = os.getenv("GEMINI_API_KEY")
          if not api_key:
              raise Exception("Missing API key: GEMINI_API_KEY")

          genai.configure(api_key=api_key)

          if not os.path.exists("diff.txt"):
              output = "No diff file found."
          else:
              with open("diff.txt", "r") as f:
                  diff_content = f.read()
              
              if not diff_content.strip() or diff_content.strip() == "No diff":
                  output = "No changes detected in this PR for review."
              else:
                  model = genai.GenerativeModel("gemini-1.5-flash")
                  prompt = f"Act as a senior developer. Review the following code changes and suggest improvements or highlight potential bugs:\n\n{diff_content}"
                  response = model.generate_content(prompt)
                  output = response.text if response and hasattr(response, 'text') else "AI could not generate a response."

          with open("review.txt", "w") as f:
              f.write(output)
          EOF

      - name: Run review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python review.py

      - name: Comment PR
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('review.txt')) {
              const review = fs.readFileSync('review.txt', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: "## 🤖 AI Code Review\n\n" + review
              });
            }