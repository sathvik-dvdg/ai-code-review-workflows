name: Gemini Code Review

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create diff
        run: |
          git fetch origin
          git diff HEAD^ HEAD > diff.txt || echo "No diff" > diff.txt

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Gemini SDK
        run: pip install google-generativeai

      - name: Create review script
        run: |
          cat > review.py << 'EOF'
import os
import google.generativeai as genai

api_key = os.getenv("GEMINI_API_KEY")
if not api_key:
    raise Exception("Missing API key")

genai.configure(api_key=api_key)

with open("diff.txt") as f:
    diff = f.read()

model = genai.GenerativeModel("gemini-1.5-flash")

response = model.generate_content(f"Review this code:\n{diff}")

output = response.text if response and hasattr(response, "text") else "No response"

with open("review.txt", "w") as f:
    f.write(output)
EOF

      - name: Run review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python review.py

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "## 🤖 AI Review\n\n" + review
            });