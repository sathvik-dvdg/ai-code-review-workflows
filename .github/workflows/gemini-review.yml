name: Gemini Code Review

on:
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Crucial: gets history so git diff HEAD^ works

      - name: Create diff
        run: |
          git fetch origin
          # Compare current HEAD with previous commit
          git diff HEAD^ HEAD > diff.txt || echo "No diff" > diff.txt

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Gemini SDK
        run: pip install google-generativeai

      - name: Create review script
        run: |
          # The Python code below is indented to satisfy YAML, 
          # but the 'cat' command will strip that indentation for the file.
          cat << 'EOF' > review.py
          import os
          import google.generativeai as genai

          api_key = os.getenv("GEMINI_API_KEY")
          if not api_key:
              raise Exception("Missing API key")

          genai.configure(api_key=api_key)

          if not os.path.exists("diff.txt"):
              output = "No diff file found."
          else:
              with open("diff.txt") as f:
                  diff = f.read()
              
              if not diff.strip() or diff.strip() == "No diff":
                  output = "No significant changes detected for review."
              else:
                  model = genai.GenerativeModel("gemini-1.5-flash")
                  prompt = f"Review this git diff and suggest improvements or catch bugs:\n\n{diff}"
                  response = model.generate_content(prompt)
                  output = response.text if response and hasattr(response, 'text') else "AI could not generate a response."

          with open("review.txt", "w") as f:
              f.write(output)
          EOF

      - name: Run review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python review.py

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('review.txt')) {
              const review = fs.readFileSync('review.txt', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: "## 🤖 Gemini AI Code Review\n\n" + review
              });
            }