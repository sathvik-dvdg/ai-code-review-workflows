name: Reusable Gemini Code Review

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git fetch origin
          git diff HEAD^ HEAD > diff.txt || echo "No diff" > diff.txt

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Create review script
        run: |
          echo "Creating Python script..."

          cat > review.py << 'EOF'
          import os
          import google.generativeai as genai

          api_key = os.getenv("GEMINI_API_KEY")

          if not api_key:
              raise ValueError("GEMINI_API_KEY missing")

          genai.configure(api_key=api_key)

          with open("diff.txt", "r") as f:
              diff = f.read()

          if not diff.strip():
              diff = "No significant changes."

          model = genai.GenerativeModel("gemini-1.5-flash")

          prompt = f"Review this code:\n{diff}"

          try:
              response = model.generate_content(prompt)
              output = response.text if response and hasattr(response, "text") else "No response"
          except Exception as e:
              output = str(e)

          with open("review.txt", "w") as f:
              f.write(output)
          EOF

      - name: Run review script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python review.py

      - name: Post comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "## 🤖 AI Code Review\n\n" + review
            });